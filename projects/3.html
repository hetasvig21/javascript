<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>hello world</h1>
    <button id="stop">Stop</button>
</body>
<script>

    const changeH = function(){
         document.querySelector("h1").innerHTML = "hii world"
    }

    const change = setTimeout(changeH , 10000)

    document.querySelector("#stop").addEventListener("click" , function(){
         clearTimeout(change);
         console.log("stopped");
    })
</script>
</html>
