<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .all{
            display: flex;
        }
        .squ{
            height: 100px;
            width: 100px;
            border: 2px solid black;
            margin: 7px;
        }
    </style>
</head>

<body>
    <h1>Color Scheme Switcher</h1>

    <div class="all">
        <div class="squ" id="gray" style="background-color: gray;"></div>
        <div class="squ" id="white" style="background-color: white;"></div>
        <div class="squ" id="blue" style="background-color: blue;"></div>
        <div class="squ" id="yellow" style="background-color: yellow;"></div>
    </div> 

    <h1>Try clicking on one of the colors above
        to change the background color of this page!</h1>
</body>
<script>
    const buttons = document.querySelectorAll(".squ")
    console.log(buttons)
    console.log(buttons[3]);
    
    document.getElementById("gray").addEventListener( "click" , function(){
        document.querySelector("body").style.backgroundColor = "gray";
    })
    document.getElementById("white").addEventListener( "click" , function(){
        document.querySelector("body").style.backgroundColor = "white";
    })
    document.getElementById("blue").addEventListener( "click" , function(){
        document.querySelector("body").style.backgroundColor = "blue";
    })
    document.getElementById("yellow").addEventListener( "click" , function(){
        document.querySelector("body").style.backgroundColor = "yellow";
    })
    

</script>
</html>
